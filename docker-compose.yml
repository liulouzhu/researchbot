services:
  researchbot:
    build: .
    image: researchbot:latest
    container_name: researchbot
    # 交互模式
    stdin_open: true
    tty: true
    # 配置文件挂载（保留数据）
    volumes:
      - ~/.researchbot:/root/.researchbot
    # 或者指定自定义配置
    # volumes:
    #   - /path/to/config.json:/root/.researchbot/config.json:ro
    environment:
      # API 密钥（也可在 config.json 中配置）
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # 命令示例
    # command: ["researchbot", "agent"]
    # command: ["researchbot", "gateway", "--port", "18799"]

  # 如果需要 API 服务模式
  researchbot-gateway:
    build: .
    image: researchbot:latest
    container_name: researchbot-gateway
    ports:
      - "18799:18799"
    volumes:
      - ~/.researchbot:/root/.researchbot
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["researchbot", "gateway", "--port", "18799"]
